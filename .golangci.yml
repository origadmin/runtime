version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - funlen
    - gocritic
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
    - whitespace

  settings:
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 140
      statements: 140
    misspell:
      locale: US

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - gocritic
          - gosec
          - errcheck
    generated: lax

